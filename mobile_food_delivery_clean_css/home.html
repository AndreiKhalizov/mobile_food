<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=414, initial-scale=1.0">
  <title>Home — Food Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen app">
    <header class="topbar">
      <img src="assets/menu.svg" alt="menu" class="top-icon">
      <a href="cart.html" class="cart-link"><img src="assets/cart.svg" alt="cart"></a>
    </header>
    <section class="intro">
      <h1>Delicious<br>food for you</h1>
      <label class="search-box">
        <span>⌕</span>
        <input type="text" placeholder="Search" aria-label="Search">
      </label>
    </section>
    <nav class="tabs" aria-label="Food categories">
      <a class="active" href="#">Foods</a>
      <a href="#">Drinks</a>
      <a href="#">Snacks</a>
      <a href="#">Sauce</a>
    </nav>
    <section class="food-row">
      <a class="food-card big" href="details.html">
        <button class="like" aria-label="favorite"><img src="assets/heart.svg" alt=""></button>
        <img src="assets/bowl.svg" alt="Veggie tomato mix">
        <h2>Veggie<br>tomato mix</h2>
        <p>N1,900</p>
      </a>
      <a class="food-card big second" href="details.html">
        <button class="like" aria-label="favorite"><img src="assets/heart.svg" alt=""></button>
        <img src="assets/salad.svg" alt="Egg and cucumber">
        <h2>Egg and<br>cucumber</h2>
        <p>N1,200</p>
      </a>
    </section>
    <section class="popular">
      <div class="section-title">
        <h3>Popular</h3>
        <a href="#">See more</a>
      </div>
      <a class="list-item" href="details.html">
        <img src="assets/burger.svg" alt="burger">
        <span>Chicken burger</span>
        <strong>N1,600</strong>
      </a>
      <a class="list-item" href="details.html">
        <img src="assets/pizza.svg" alt="pizza">
        <span>Hot pizza</span>
        <strong>N2,100</strong>
      </a>
    </section>
    <nav class="bottom-nav">
      <a class="active" href="home.html"><img src="assets/home.svg" alt="home"></a>
      <a href="#"><img src="assets/heart.svg" alt="favorites"></a>
      <a href="profile.html"><img src="assets/user.svg" alt="profile"></a>
      <a href="#"><img src="assets/history.svg" alt="history"></a>
    </nav>
  </main>
</body>
</html>
