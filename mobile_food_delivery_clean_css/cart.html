<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=414, initial-scale=1.0">
  <title>Cart — Food Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen app cart-screen">
    <header class="page-head">
      <a href="home.html"><img src="assets/back.svg" alt="back"></a>
      <h1>Cart</h1>
      <span></span>
    </header>
    <p class="swipe-note">swipe on an item to delete</p>
    <section class="cart-list">
      <article class="cart-item">
        <img src="assets/bowl.svg" alt="Veggie tomato mix">
        <div>
          <h2>Veggie tomato mix</h2>
          <strong>N1,900</strong>
        </div>
        <div class="counter"><span>-</span><b>1</b><span>+</span></div>
      </article>
      <article class="cart-item">
        <img src="assets/salad.svg" alt="Fishwith mix orange">
        <div>
          <h2>Fishwith mix orange</h2>
          <strong>N1,900</strong>
        </div>
        <div class="counter"><span>-</span><b>1</b><span>+</span></div>
      </article>
      <article class="cart-item">
        <img src="assets/burger.svg" alt="Chicken burger">
        <div>
          <h2>Chicken burger</h2>
          <strong>N1,600</strong>
        </div>
        <div class="counter"><span>-</span><b>1</b><span>+</span></div>
      </article>
    </section>
    <div class="total-row"><span>Total</span><strong>N5,400</strong></div>
    <a href="payment.html" class="primary-btn checkout-btn">Complete order</a>
  </main>
</body>
</html>
